name: Python CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

  cd:
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        run: echo "Deploying to AWS EC2 server"